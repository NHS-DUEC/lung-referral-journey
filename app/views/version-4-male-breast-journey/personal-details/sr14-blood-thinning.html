{% extends "111/layouts/base.html" %}

{% block content_primary %}
<div class="nhsuk-u-reading-width">

  <form action="/version-4/personal-details/sr14-blood-thinning" method="post" novalidate>
    <div class="nhsuk-form-group nhsuk-u-margin-bottom-5">
      <fieldset class="nhsuk-fieldset">
        <legend class="nhsuk-fieldset__legend nhsuk-fieldset__legend--l">
          <h1 class="nhsuk-fieldset__heading">Do you take blood thinning medicine?</h1>
        </legend>

        <div class="app-callout app-callout--info nhsuk-u-margin-bottom-4">
          <p>This means wafarin, heparin, rivaroxaban, edoxaban, clopidogrel and apixaban.</p>
          <p>Knowing this information helps the clinic with tests and investigations.</p>
        </div>

        <div class="nhsuk-radios">
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="blood-thinning" name="blood-thinning" type="radio" value="yes">
            <label class="nhsuk-label nhsuk-radios__label" for="blood-thinning">Yes</label>
          </div>
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="blood-thinning-2" name="blood-thinning" type="radio" value="no">
            <label class="nhsuk-label nhsuk-radios__label" for="blood-thinning-2">No</label>
          </div>
        </div>
      </fieldset>
    </div>

    <button class="nhsuk-button" type="submit" data-module="nhsuk-button">Next</button>
  </form>

  <details class="nhsuk-details nhsuk-u-reading-width nhsuk-u-margin-top-4">
    <summary class="nhsuk-details__summary">
      <span class="nhsuk-details__summary-text">Does this page make sense?</span>
    </summary>
  </details>

</div>
{% endblock %}
