{% extends "111/layouts/base.html" %}

{% block content_primary %}
<div class="nhsuk-u-reading-width">

  <form action="/version-4/personal-details/sr15-mobility" method="post" novalidate>
    <div class="nhsuk-form-group nhsuk-u-margin-bottom-5">
      <fieldset class="nhsuk-fieldset">
        <legend class="nhsuk-fieldset__legend nhsuk-fieldset__legend--l">
          <h1 class="nhsuk-fieldset__heading">Will you need help moving around during your appointment?</h1>
        </legend>

        <div class="nhsuk-radios">
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="mobility" name="mobility" type="radio" value="cannot-move">
            <label class="nhsuk-label nhsuk-radios__label" for="mobility">I cannot move without help</label>
          </div>
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="mobility-2" name="mobility" type="radio" value="some-help">
            <label class="nhsuk-label nhsuk-radios__label" for="mobility-2">I need some help to move</label>
          </div>
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="mobility-3" name="mobility" type="radio" value="no">
            <label class="nhsuk-label nhsuk-radios__label" for="mobility-3">No</label>
          </div>
        </div>
      </fieldset>
    </div>

    <button class="nhsuk-button" type="submit" data-module="nhsuk-button">Next</button>
  </form>

  <details class="nhsuk-details nhsuk-u-reading-width nhsuk-u-margin-top-4">
    <summary class="nhsuk-details__summary">
      <span class="nhsuk-details__summary-text">Does this page make sense?</span>
    </summary>
  </details>

</div>
{% endblock %}
