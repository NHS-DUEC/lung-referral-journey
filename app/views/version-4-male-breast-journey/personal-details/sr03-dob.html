{% extends "111/layouts/base.html" %}

{% block content_primary %}
<div class="nhsuk-u-reading-width">

  <form action="/version-4/personal-details/sr03-dob" method="post" novalidate>
    <div class="nhsuk-form-group nhsuk-u-margin-bottom-5">
      <fieldset class="nhsuk-fieldset" aria-describedby="dob-hint">
        <legend class="nhsuk-fieldset__legend nhsuk-fieldset__legend--l">
          <h1 class="nhsuk-fieldset__heading">What is your date of birth?</h1>
        </legend>
        <div class="nhsuk-hint" id="dob-hint">For example, 15 3 1984</div>

        <div class="nhsuk-date-input">
          <div class="nhsuk-date-input__item">
            <label class="nhsuk-label nhsuk-date-input__label" for="dob-day">Day</label>
            <input class="nhsuk-input nhsuk-date-input__input nhsuk-input--width-2" id="dob-day" name="dob-day" type="number" value="{{ data['dob-day'] }}">
          </div>
          <div class="nhsuk-date-input__item">
            <label class="nhsuk-label nhsuk-date-input__label" for="dob-month">Month</label>
            <input class="nhsuk-input nhsuk-date-input__input nhsuk-input--width-2" id="dob-month" name="dob-month" type="number" value="{{ data['dob-month'] }}">
          </div>
          <div class="nhsuk-date-input__item">
            <label class="nhsuk-label nhsuk-date-input__label" for="dob-year">Year</label>
            <input class="nhsuk-input nhsuk-date-input__input nhsuk-input--width-4" id="dob-year" name="dob-year" type="number" value="{{ data['dob-year'] }}">
          </div>
        </div>
      </fieldset>
    </div>

    <button class="nhsuk-button" type="submit" data-module="nhsuk-button">Next</button>
  </form>

  <details class="nhsuk-details nhsuk-u-reading-width nhsuk-u-margin-top-4">
    <summary class="nhsuk-details__summary">
      <span class="nhsuk-details__summary-text">Does this page make sense?</span>
    </summary>
  </details>

</div>
{% endblock %}
