{% extends "111/layouts/base.html" %}

{% block content_primary %}
<div class="nhsuk-u-reading-width">

  <form action="/version-4/personal-details/sr02-name" method="post" novalidate>
    <div class="nhsuk-form-group nhsuk-u-margin-bottom-5">
      <h1 class="nhsuk-heading-l">What is your name?</h1>

      <label class="nhsuk-label" for="FirstName">First name</label>
      <input class="nhsuk-input nhsuk-u-width-three-quarters nhsuk-u-margin-bottom-4" id="FirstName" name="FirstName" type="text" value="{{ data['FirstName'] }}">

      <label class="nhsuk-label" for="LastName">Last name</label>
      <input class="nhsuk-input nhsuk-u-width-three-quarters" id="LastName" name="LastName" type="text" value="{{ data['LastName'] }}">
    </div>

    <button class="nhsuk-button" type="submit" data-module="nhsuk-button">Next</button>
  </form>

  <details class="nhsuk-details nhsuk-u-reading-width nhsuk-u-margin-top-4">
    <summary class="nhsuk-details__summary">
      <span class="nhsuk-details__summary-text">Does this page make sense?</span>
    </summary>
  </details>

</div>
{% endblock %}
