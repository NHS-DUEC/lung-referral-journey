{% extends "111/layouts/base.html" %}

{% block content_primary %}
<div class="nhsuk-u-reading-width">

  <form action="/version-4/personal-details/sr04-contact" method="post" novalidate>
    <div class="nhsuk-form-group nhsuk-u-margin-bottom-5">
      <fieldset class="nhsuk-fieldset">
        <legend class="nhsuk-fieldset__legend nhsuk-fieldset__legend--l">
          <h1 class="nhsuk-fieldset__heading">How should the clinic contact you?</h1>
        </legend>

        <div class="app-callout app-callout--info nhsuk-u-margin-bottom-4">
          <p>The clinic staff prefer to contact people by phone if possible.</p>
        </div>

        <div class="nhsuk-radios">
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="contact-method" name="contact-method" type="radio" value="call">
            <label class="nhsuk-label nhsuk-radios__label" for="contact-method">They can call me</label>
          </div>
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="contact-method-2" name="contact-method" type="radio" value="cannot-speak">
            <label class="nhsuk-label nhsuk-radios__label" for="contact-method-2">I cannot speak on the phone</label>
          </div>
        </div>
      </fieldset>
    </div>

    <button class="nhsuk-button" type="submit" data-module="nhsuk-button">Next</button>
  </form>

  <details class="nhsuk-details nhsuk-u-reading-width nhsuk-u-margin-top-4">
    <summary class="nhsuk-details__summary">
      <span class="nhsuk-details__summary-text">Does this page make sense?</span>
    </summary>
  </details>

</div>
{% endblock %}
