{% extends "111/layouts/base.html" %}

{% block content_primary %}
<div class="nhsuk-u-reading-width">

  <form action="/version-4/pathway-questions/q4" method="post" novalidate>
    <div class="nhsuk-form-group nhsuk-u-margin-bottom-5">
      <fieldset class="nhsuk-fieldset">
        <legend class="nhsuk-fieldset__legend nhsuk-fieldset__legend--l nhsuk-u-margin-bottom-5">
          <h1 class="nhsuk-fieldset__heading">Are there any lumps in your breast?</h1>
        </legend>

        <div class="app-callout app-callout--info">
          <p>The lump might be felt behind or near the nipple, up to the collarbone or in the armpit.</p>
        </div>

        <div class="nhsuk-radios nhsuk-u-margin-top-4">
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="SelectedAnswer" name="SelectedAnswer" type="radio" value="Yes">
            <label class="nhsuk-label nhsuk-radios__label" for="SelectedAnswer">Yes</label>
          </div>
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="SelectedAnswer_1" name="SelectedAnswer" type="radio"
              value="I'm not sure" disabled>
            <label class="nhsuk-label nhsuk-radios__label" for="SelectedAnswer_1">I'm not sure</label>
          </div>
          <div class="nhsuk-radios__item">
            <input class="nhsuk-radios__input" id="SelectedAnswer_2" name="SelectedAnswer" type="radio" value="No" disabled>
            <label class="nhsuk-label nhsuk-radios__label" for="SelectedAnswer_2">No</label>
          </div>
        </div>
      </fieldset>
    </div>
    <button class="nhsuk-button" type="submit" data-module="nhsuk-button">Next</button>
  </form>


  <details class="nhsuk-details nhsuk-u-reading-width nhsuk-u-margin-top-4">
    <summary class="nhsuk-details__summary">
      <span class="nhsuk-details__summary-text">Does this page make sense?</span>
    </summary>
  </details>

</div>
{% endblock %}
